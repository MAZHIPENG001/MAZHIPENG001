<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAZHIPENG 的个人主页</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            color: white;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.5);
            margin-bottom: 20px;
        }

        h1 { font-size: 2.5rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        p { font-size: 1.1rem; opacity: 0.9; margin-bottom: 30px; }

        /* 按钮样式优化：加入图标对齐 */
        .links a {
            display: inline-flex; /* 使用 flex 让图标和文字对齐 */
            align-items: center;
            text-decoration: none;
            color: #333;
            background: white;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
            margin: 8px;
        }

        /* 图标间距 */
        .links a i {
            margin-right: 10px;
            font-size: 1.2rem;
        }

        .links a:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            background: #f0f0f0;
            color: #000;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://github.com/MAZHIPENG001.png" alt="Profile" class="profile-img">
        <h1>MAZHIPENG</h1>
        <p>🚀 开发者 | 终身学习者 | 正在打造我的 GitHub 空间</p>
        
        <div class="links">
            <a href="https://github.com/MAZHIPENG001" target="_blank">
                <i class="fa-brands fa-github"></i> GitHub
            </a>
            <a href="mailto:mazhipeng2468@gmail.com">
                <i class="fa-solid fa-envelope"></i> 联系我
            </a>
        </div>
    </div>

</body>
</html>
